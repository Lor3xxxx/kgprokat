# Деплой на Netlify (Next.js SSR + Postgres от Netlify DB / Neon).
# Строка подключения NETLIFY_DATABASE_URL подставляется расширением Netlify DB
# во время сборки и в рантайме функций.

[build]
  # 1) генерируем клиент 2) создаём схему в Postgres 3) заливаем данные (идемпотентно) 4) собираем
  command = "prisma generate && npx prisma db push --accept-data-loss --skip-generate && npx tsx prisma/seed-prod.ts && next build --webpack"

[functions]
  # Движок Prisma нужен внутри серверless-функции
  included_files = [
    "node_modules/.prisma/client/**",
    "node_modules/@prisma/client/**",
  ]

[[plugins]]
  package = "@netlify/plugin-nextjs"
